<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindGuard Challenge</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            max-width: 500px;
            width: 90%;
        }

        h1 { margin-bottom: 1rem; }
        p { margin-bottom: 2rem; font-size: 1.1rem; }

        .btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 1rem 2rem;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            display: block;
            width: 100%;
            margin-bottom: 1rem;
        }

        .btn:hover {
            background: white;
            color: #764ba2;
        }

        #feedback {
            margin-top: 1rem;
            font-weight: bold;
            height: 1.5em;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🛡️ MindGuard Challenge</h1>
        <p id="question">Loading challenge...</p>
        
        <div id="options"></div>
        <div id="feedback"></div>
    </div>

    <script src="quiz.js"></script>
</body>
</html>
