<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - MindGuard</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        body {
            background: var(--light);
            padding-top: 80px;
        }

        .page-header {
            background: var(--gradient-primary);
            color: var(--white);
            padding: 3rem 0;
            margin-bottom: 3rem;
            text-align: center;
        }

        .filters {
            background: var(--white);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: var(--shadow-md);
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
        }

        .filter-btn {
            padding: 0.75rem 1.5rem;
            border: 2px solid var(--primary);
            border-radius: 12px;
            background: var(--white);
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: var(--gradient-primary);
            color: var(--white);
        }

        .filter-btn:hover {
            transform: translateY(-2px);
        }

        .timeline {
            position: relative;
            padding-left: 3rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--primary), var(--secondary));
        }

        .timeline-day {
            margin-bottom: 3rem;
        }

        .day-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .day-marker {
            width: 40px;
            height: 40px;
            background: var(--gradient-primary);
            color: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            position: relative;
            left: -30px;
            box-shadow: var(--shadow-md);
        }

        .day-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--dark);
        }

        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .activity-item {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            position: relative;
            left: 10px;
        }

        .activity-item:hover {
            transform: translateX(5px);
            box-shadow: var(--shadow-lg);
        }

        .activity-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .activity-icon {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 1.5rem;
        }

        .activity-icon.blocked {
            background: rgba(248, 113, 113, 0.2);
        }

        .activity-icon.allowed {
            background: rgba(74, 222, 128, 0.2);
        }

        .activity-icon.unlocked {
            background: rgba(251, 191, 36, 0.2);
        }

        .activity-details h4 {
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
            color: var(--dark);
        }

        .activity-details p {
            color: var(--gray);
            font-size: 0.9rem;
        }

        .activity-meta {
            text-align: right;
        }

        .activity-time {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.3rem;
        }

        .activity-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-blocked {
            background: rgba(248, 113, 113, 0.2);
            color: var(--danger);
        }

        .badge-allowed {
            background: rgba(74, 222, 128, 0.2);
            color: var(--success);
        }

        .badge-unlocked {
            background: rgba(251, 191, 36, 0.2);
            color: var(--warning);
        }

        .empty-state {
            text-align: center;
            padding: 5rem 2rem;
            color: var(--gray);
        }

        .empty-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }

        .stats-summary {
            background: var(--white);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: var(--shadow-md);
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 2rem;
            text-align: center;
        }

        .summary-item h4 {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .summary-item p {
            color: var(--gray);
        }

        @media (max-width: 768px) {
            .activity-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .activity-meta {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <span>🛡️ MindGuard</span>
            </div>
            <ul class="nav-menu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="analytics.html">Analytics</a></li>
                <li><a href="rules.html">Rules</a></li>
                <li><a href="settings.html">Settings</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- Header -->
    <div class="page-header">
        <h1>📝 Activity History</h1>
        <p>Your complete focus journey timeline</p>
    </div>

    <div class="container">
        <!-- Summary Stats -->
        <div class="stats-summary">
            <div class="summary-item">
                <h4 id="totalBlocked">0</h4>
                <p>Blocked</p>
            </div>
            <div class="summary-item">
                <h4 id="totalAllowed">0</h4>
                <p>Allowed</p>
            </div>
            <div class="summary-item">
                <h4 id="totalUnlocked">0</h4>
                <p>Unlocked</p>
            </div>
            <div class="summary-item">
                <h4 id="totalTime">0</h4>
                <p>Time Saved</p>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <div class="filter-group">
                <button class="filter-btn active" onclick="filterByType('all')">All</button>
                <button class="filter-btn" onclick="filterByType('blocked')">🚫 Blocked</button>
                <button class="filter-btn" onclick="filterByType('allowed')">✅ Allowed</button>
                <button class="filter-btn" onclick="filterByType('unlocked')">🔓 Unlocked</button>
            </div>
            <div class="filter-group">
                <button class="filter-btn" onclick="filterByTime(1)">Today</button>
                <button class="filter-btn" onclick="filterByTime(7)">Week</button>
                <button class="filter-btn" onclick="filterByTime(30)">Month</button>
            </div>
        </div>

        <!-- Timeline -->
        <div class="timeline" id="timeline">
            <!-- Dynamically loaded -->
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>

    <script>
        let allActivities = [];
        let currentFilter = 'all';
        let currentDays = 30;

        const activityIcons = {
            blocked: '🚫',
            allowed: '✅',
            unlocked: '🔓'
        };

        async function loadHistory() {
            const user = firebase.auth().currentUser;
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            // Get activities from last 30 days
            const startDate = new Date();
            startDate.setDate(startDate.getDate() - currentDays);

            const snapshot = await firebase.firestore()
                .collection('distraction_logs')
                .where('userId', '==', user.uid)
                .where('timestamp', '>=', startDate)
                .orderBy('timestamp', 'desc')
                .limit(100)
                .get();

            allActivities = [];
            let blocked = 0, allowed = 0, unlocked = 0;

            snapshot.forEach(doc => {
                const data = doc.data();
                allActivities.push({
                    id: doc.id,
                    domain: data.domain,
                    action: data.action,
                    timestamp: data.timestamp.toDate(),
                    title: data.title || ''
                });

                if (data.action === 'blocked') blocked++;
                if (data.action === 'allowed') allowed++;
                if (data.action === 'unlocked') unlocked++;
            });

            // Update summary
            document.getElementById('totalBlocked').textContent = blocked;
            document.getElementById('totalAllowed').textContent = allowed;
            document.getElementById('totalUnlocked').textContent = unlocked;
            document.getElementById('totalTime').textContent = `${blocked * 10}m`;

            renderTimeline();
        }

        function renderTimeline() {
            const container = document.getElementById('timeline');
            
            // Filter activities
            let filtered = allActivities;
            if (currentFilter !== 'all') {
                filtered = allActivities.filter(a => a.action === currentFilter);
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <h3>No activities yet</h3>
                        <p>Your history will appear here as you use MindGuard</p>
                    </div>
                `;
                return;
            }

            // Group by day
            const grouped = {};
            filtered.forEach(activity => {
                const date = activity.timestamp.toLocaleDateString();
                if (!grouped[date]) grouped[date] = [];
                grouped[date].push(activity);
            });

            // Render timeline
            let html = '';
            Object.entries(grouped).forEach(([date, activities], index) => {
                html += `
                    <div class="timeline-day">
                        <div class="day-header">
                            <div class="day-marker">${index + 1}</div>
                            <div class="day-title">${formatDate(date)}</div>
                        </div>
                        <div class="activity-list">
                            ${activities.map(activity => `
                                <div class="activity-item">
                                    <div class="activity-info">
                                        <div class="activity-icon ${activity.action}">
                                            ${activityIcons[activity.action]}
                                        </div>
                                        <div class="activity-details">
                                            <h4>${activity.domain}</h4>
                                            <p>${activity.title || 'No title'}</p>
                                        </div>
                                    </div>
                                    <div class="activity-meta">
                                        <div class="activity-time">${formatTime(activity.timestamp)}</div>
                                        <span class="activity-badge badge-${activity.action}">
                                            ${activity.action.toUpperCase()}
                                        </span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            if (date.toDateString() === today.toDateString()) {
                return 'Today';
            } else if (date.toDateString() === yesterday.toDateString()) {
                return 'Yesterday';
            } else {
                return date.toLocaleDateString('en-US', { 
                    weekday: 'long', 
                    month: 'short', 
                    day: 'numeric' 
                });
            }
        }

        function formatTime(date) {
            return date.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
        }

        function filterByType(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderTimeline();
        }

        function filterByTime(days) {
            currentDays = days;
            loadHistory();
        }

        function logout() {
            firebase.auth().signOut().then(() => {
                window.location.href = 'login.html';
            });
        }

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                loadHistory();
            } else {
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
