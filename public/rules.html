<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rules - MindGuard</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        body {
            background: var(--light);
            padding-top: 100px; /* Increased to account for fixed navbar */
            min-height: 100vh;
        }

        .page-header {
            background: var(--gradient-primary);
            color: var(--white);
            padding: 4rem 0 3rem;
            margin-bottom: 4rem;
            text-align: center;
            border-radius: 0 0 30px 30px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .add-rule-card {
            background: var(--white);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            margin-bottom: 4rem;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .add-rule-form {
            display: grid;
            grid-template-columns: 2fr 1fr auto;
            gap: 1.5rem;
            align-items: end;
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.75rem;
            font-weight: 600;
            color: var(--dark);
            font-size: 0.95rem;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 1.2rem;
            border: 2px solid rgba(0, 0, 0, 0.08);
            border-radius: 14px;
            font-size: 1rem;
            background: var(--light);
            transition: all 0.3s ease;
            font-family: var(--font-primary);
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: translateY(-1px);
        }

        .btn-add {
            padding: 1.2rem 2.5rem;
            background: var(--gradient-primary);
            color: var(--white);
            border: none;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            white-space: nowrap;
        }

        .btn-add:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-glow);
        }

        .rules-section {
            background: var(--white);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            margin-bottom: 4rem;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .rules-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--light);
        }

        .rules-header h3 {
            color: var(--dark);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .rules-list {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .rule-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem;
            background: var(--light);
            border-radius: 16px;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        .rule-item:hover {
            transform: translateX(8px);
            box-shadow: var(--shadow-md);
            background: var(--white);
        }

        .rule-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .rule-domain {
            font-weight: 600;
            color: var(--dark);
            font-size: 1.2rem;
        }

        .rule-badge {
            padding: 0.5rem 1.2rem;
            border-radius: 24px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-block {
            background: rgba(248, 113, 113, 0.15);
            color: var(--danger);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .badge-allow {
            background: rgba(74, 222, 128, 0.15);
            color: var(--success);
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .rule-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }

        .btn-delete {
            background: rgba(248, 113, 113, 0.1);
            color: var(--danger);
        }

        .btn-delete:hover {
            background: var(--danger);
            color: var(--white);
            transform: scale(1.1);
        }

        .quick-add {
            background: var(--white);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .quick-add h3 {
            color: var(--dark);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .quick-add p {
            color: var(--gray);
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .quick-add-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1.2rem;
        }

        .quick-add-btn {
            padding: 1.2rem;
            border: 2px solid var(--primary);
            border-radius: 14px;
            background: var(--white);
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .quick-add-btn:hover {
            background: var(--gradient-primary);
            color: var(--white);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .quick-add-btn.added {
            background: var(--light);
            border-color: var(--gray);
            color: var(--gray);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--gray);
        }

        .empty-state-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 1.1rem;
            margin: 0;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .add-rule-form {
                grid-template-columns: 1fr 1fr auto;
                gap: 1rem;
            }

            .container {
                padding: 0 1.5rem;
            }
        }

        @media (max-width: 768px) {
            body {
                padding-top: 90px;
            }

            .page-header {
                padding: 3rem 0 2rem;
                margin-bottom: 3rem;
            }

            .add-rule-card,
            .rules-section,
            .quick-add {
                padding: 2rem;
                margin-bottom: 3rem;
            }

            .add-rule-form {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .btn-add {
                width: 100%;
                margin-top: 1rem;
            }

            .rule-item {
                flex-direction: column;
                gap: 1.5rem;
                align-items: flex-start;
                padding: 1.5rem;
            }

            .rule-info {
                width: 100%;
                justify-content: space-between;
            }

            .quick-add-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 1rem;
            }

            .page-header h1 {
                font-size: 2rem;
            }

            .add-rule-card,
            .rules-section,
            .quick-add {
                padding: 1.5rem;
                border-radius: 16px;
            }

            .quick-add-grid {
                grid-template-columns: 1fr;
            }

            .rule-item {
                padding: 1.2rem;
            }

            .rule-domain {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <span>🛡️ MindGuard</span>
            </div>
            <ul class="nav-menu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="analytics.html">Analytics</a></li>
                <li><a href="rules.html">Rules</a></li>
                <li><a href="settings.html">Settings</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- Header -->
    <div class="page-header">
        <div class="container">
            <h1>⚙️ Manage Rules</h1>
            <p>Create and manage website blocking rules to control your browsing experience</p>
        </div>
    </div>

    <div class="container">
        <!-- Add Rule Form -->
        <div class="add-rule-card">
            <h3 style="margin-bottom: 1.5rem;">➕ Add New Rule</h3>
            <form id="addRuleForm" class="add-rule-form">
                <div class="form-group">
                    <label for="domain">Website Domain</label>
                    <input 
                        type="text" 
                        id="domain" 
                        class="form-input" 
                        placeholder="example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="action">Action</label>
                    <select id="action" class="form-select">
                        <option value="block">🚫 Block</option>
                        <option value="allow">✅ Allow</option>
                    </select>
                </div>

                <button type="submit" class="btn-add">Add Rule</button>
            </form>
        </div>

        <!-- Your Rules -->
        <div class="rules-section">
            <div class="rules-header">
                <h3>📋 Your Rules (<span id="rulesCount">0</span>)</h3>
            </div>
            <div id="rulesList" class="rules-list">
                <!-- Dynamically loaded -->
            </div>
        </div>

        <!-- Quick Add Popular Sites -->
        <div class="quick-add">
            <h3>💡 Quick Add Popular Sites</h3>
            <p style="color: var(--gray); margin-bottom: 1rem;">Click to add commonly blocked sites</p>
            <div class="quick-add-grid" id="quickAddGrid">
                <!-- Dynamically loaded -->
            </div>
        </div>
    </div>


  <script>
const BIN_ID = "69cfddf0856a682189f80ea9";
const API_KEY = "$2a$10$gqdaj19DJxBqXw.9bFdHAOIUirymKNuOQVxjqju1zvjhHN8hgRZTG";

let userRules = JSON.parse(localStorage.getItem("rules")) || [];

const popularSites = ['youtube.com','instagram.com','facebook.com','twitter.com'];

// 🔥 SAVE TO JSONBIN (FIXED)
async function saveRulesToCloud(rules) {
    try {
        // Fetch existing data to safely update without overwriting analytics/settings
        const getRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
            headers: { "X-Master-Key": API_KEY }
        });
        const existingData = await getRes.json();
        const fullRecord = existingData.record || {};
        
        fullRecord.rules = rules;

        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "X-Master-Key": API_KEY
            },
            body: JSON.stringify(fullRecord)
        });

        console.log("Saved to JSONBin ✅");
    } catch (e) {
        console.log("Cloud save failed ❌", e);
    }
}

// 🔥 LOAD FROM JSONBIN (FIXED)
async function loadFromCloud() {
    try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
            headers: {
                "X-Master-Key": API_KEY
            }
        });

        const data = await res.json();

        console.log("Cloud Data:", data);

        if (data.record && data.record.rules) {
            userRules = data.record.rules;
            localStorage.setItem("rules", JSON.stringify(userRules));
        }

    } catch (e) {
        console.log("Using local data ❌", e);
    }

    renderRules();
    renderQuickAdd();
}

// 🔥 RENDER RULES
function renderRules() {
    const rulesList = document.getElementById("rulesList");
    const rulesCount = document.getElementById("rulesCount");

    rulesList.innerHTML = "";

    if (userRules.length === 0) {
        rulesList.innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">📋</div>
                <p>No rules added yet</p>
            </div>`;
        rulesCount.textContent = "0";
        return;
    }

    rulesCount.textContent = userRules.length;

    userRules.forEach(rule => {
        const div = document.createElement("div");
        div.className = "rule-item";

        div.innerHTML = `
            <div class="rule-info">
                <span class="rule-domain">${rule.domain}</span>
                <span class="rule-badge ${rule.action === "block" ? "badge-block" : "badge-allow"}">
                    ${rule.action === "block" ? "🚫 Block" : "✅ Allow"}
                </span>
            </div>
            <div class="rule-actions">
                <button class="btn-icon btn-delete" onclick="deleteRule(${rule.id})">🗑️</button>
            </div>
        `;

        rulesList.appendChild(div);
    });
}

// 🔥 QUICK ADD
function renderQuickAdd() {
    const grid = document.getElementById("quickAddGrid");
    grid.innerHTML = "";

    popularSites.forEach(site => {
        const exists = userRules.some(r => r.domain === site);

        const btn = document.createElement("button");
        btn.className = `quick-add-btn ${exists ? "added" : ""}`;
        btn.textContent = site;
        btn.disabled = exists;

        btn.onclick = () => addPopularSite(site);

        grid.appendChild(btn);
    });
}

// 🔥 ADD POPULAR
function addPopularSite(site) {
    if (userRules.some(r => r.domain === site)) return;

    userRules.push({ id: Date.now(), domain: site, action: "block" });

    localStorage.setItem("rules", JSON.stringify(userRules));
    saveRulesToCloud(userRules);

    renderRules();
    renderQuickAdd();
}

// 🔥 ADD RULE
document.getElementById("addRuleForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const domain = document.getElementById("domain").value.trim();
    const action = document.getElementById("action").value;

    if (!domain) return alert("Enter domain");

    if (userRules.some(r => r.domain === domain)) {
        return alert("Already exists");
    }

    userRules.push({ id: Date.now(), domain, action });

    localStorage.setItem("rules", JSON.stringify(userRules));
    saveRulesToCloud(userRules);

    document.getElementById("domain").value = "";

    renderRules();
    renderQuickAdd();
});

// 🔥 DELETE RULE
function deleteRule(id) {
    userRules = userRules.filter(r => r.id != id);

    localStorage.setItem("rules", JSON.stringify(userRules));
    saveRulesToCloud(userRules);

    renderRules();
    renderQuickAdd();
}

// 🔥 AUTH CHECK
if (localStorage.getItem("isLoggedIn") === "true") {
    loadFromCloud();
} else {
    window.location.href = "login.html";
}
</script>
</body>
</html>
